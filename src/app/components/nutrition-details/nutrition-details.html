<p-card>
  <ng-template #title> Nutrition (per serving)</ng-template>
  <div>
    <div>Calories {{ nutrition()?.calories }} kcal</div>
    <div>Carbohydrates {{ nutrition()?.carbs }} g</div>
    <div>Fat {{ nutrition()?.fat }} g</div>
    <div>Protein {{ nutrition()?.protein }} g</div>
  </div>
</p-card>
